name: CI and Publish

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies (high+)
        run: npm audit --audit-level=high

      - name: OSV dependency scan
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            ghcr.io/google/osv-scanner:v2.3.5 \
            scan --lockfile=package-lock.json

      - name: Check for disallowed licenses
        run: |
          npx license-checker --production --failOn "GPL;AGPL;LGPL;SSPL;BUSL" --summary

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

  test:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require test script
        run: node -e "if (!require('./package.json').scripts?.test) { console.error('A test script is required for CI enforcement. Add scripts.test to package.json.'); process.exit(1); }"

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  docker_security:
    name: Docker Security Gate
    runs-on: ubuntu-latest
    needs:
      - security
      - test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: local/checkmate-mcp:${{ github.sha }}

      - name: Trivy image scan (blocking)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/checkmate-mcp:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"

  docker_smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs:
      - security
      - test
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: local/checkmate-mcp-smoke:${{ github.sha }}

      - name: Run container and wait for Docker health
        shell: bash
        run: |
          docker run -d --name checkmate-mcp-smoke \
            -e PORT=3003 \
            -e CHECKMATE_URL=http://localhost:8000 \
            local/checkmate-mcp-smoke:${{ github.sha }}
          for i in {1..60}; do
            container_status="$(docker inspect --format='{{.State.Status}}' checkmate-mcp-smoke 2>/dev/null || echo missing)"
            health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' checkmate-mcp-smoke 2>/dev/null || echo missing)"
            if [ "$container_status" != "running" ]; then
              echo "Smoke test failed: container status is '$container_status'"
              docker inspect --format='{{json .State}}' checkmate-mcp-smoke || true
              docker logs checkmate-mcp-smoke || true
              exit 1
            fi
            if [ "$health_status" = "healthy" ]; then
              echo "Smoke test passed"
              exit 0
            fi
            if [ "$health_status" = "unhealthy" ]; then
              echo "Smoke test failed: health status is '$health_status'"
              docker inspect --format='{{json .State.Health}}' checkmate-mcp-smoke || true
              docker logs checkmate-mcp-smoke || true
              exit 1
            fi
            sleep 2
          done
          echo "Smoke test failed: container did not become healthy"
          docker ps -a --filter name=checkmate-mcp-smoke
          docker inspect --format='{{json .State.Health}}' checkmate-mcp-smoke || true
          docker logs checkmate-mcp-smoke
          exit 1

      - name: Cleanup smoke test container
        if: always()
        shell: bash
        run: docker rm -f checkmate-mcp-smoke || true

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - security
      - test
      - docker_security
      - docker_smoke
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
